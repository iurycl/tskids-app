<ion-header class="ion-no-border app-page-header">

  <ion-toolbar class="header-main">
    <div class="header-toolbar-inner">
      <div class="logo-wrap">
        <span class="logo-icon">✦</span>
        <div class="logo-text">
          <span class="logo-ts">TS</span><span class="logo-kids">KIDS</span>
          <small class="logo-sub">MARKETPLACE</small>
        </div>
      </div>
      <div class="search-wrap">
        <ion-icon name="search-outline" class="search-icon"></ion-icon>
        <input
          type="search"
          class="search-bar"
          placeholder="Buscar carrinhos..."
          (input)="onSearchInput($event)"
        />
      </div>
    </div>
  </ion-toolbar>

  <div class="category-toolbar category-toolbar--mobile" style="background: #1A1A1A;">
    <button class="category-open-btn" (click)="openCategoryMenu()" aria-label="Escolher categoria">
      <ion-icon name="menu-outline" aria-hidden="true"></ion-icon>
      Categorias --
    </button>
    <span class="category-current-title">{{ selectedCategoryTitle() }}</span>
  </div>

  <ion-toolbar class="category-toolbar category-toolbar--desktop" style="background: #1A1A1A;">
    <div class="category-tabs">
      <button
        class="category-tab-btn"
        [class.active]="!selectedCat"
        (click)="selectCategory('')"
      >TODOS</button>
      <button
        *ngFor="let cat of categories()"
        class="category-tab-btn"
        [class.active]="selectedCat === cat.id"
        (click)="selectCategory(cat.id)"
      >{{ cat.name | uppercase }}</button>
    </div>
  </ion-toolbar>

</ion-header>

<!-- ── Category bottom sheet ────────────────────────────────────── -->
<div class="sheet-backdrop" *ngIf="showCategorySheet" (click)="closeCategorySheet()"></div>
<div class="sheet-panel" [class.sheet-open]="showCategorySheet">
  <div class="sheet-header">
    <span>Categorias</span>
    <button class="sheet-close-btn" (click)="closeCategorySheet()">✕</button>
  </div>
  <button class="sheet-item" [class.sheet-item--active]="!selectedCat" (click)="pickCategory('')">TODOS</button>
  <button
    *ngFor="let cat of categories()"
    class="sheet-item"
    [class.sheet-item--active]="selectedCat === cat.id"
    (click)="pickCategory(cat.id)"
  >{{ cat.name | uppercase }}</button>
</div>

<!-- ── Content ──────────────────────────────────────────────────── -->
<ion-content class="page-content">

  <!-- Hero banner (estilo "Bem-vindo ao marketplace") -->
  <div class="hero-banner">
    <span class="hero-badge">BEM-VINDO</span>
    <div class="hero-text">
      <p>AO MARKETPLACE DE</p>
      <strong>CARRINHOS ELÉTRICOS INFANTIS</strong>
    </div>
  </div>

  <!-- Título da seção (igual ao "SELECIONE SEU CARRO") -->
  <div class="section-header">
    <h2>SELECIONE O CARRINHO DO SEU FILHO</h2>
  </div>

  <!-- Loading skeleton -->
  <div *ngIf="isLoading()" class="product-grid">
    <ion-card *ngFor="let _ of [1,2,3,4,5,6,7,8]" class="skeleton-card">
      <ion-skeleton-text [animated]="true" style="height:190px;"></ion-skeleton-text>
      <ion-card-header>
        <ion-skeleton-text [animated]="true" style="width:55%;height:12px;"></ion-skeleton-text>
        <ion-skeleton-text [animated]="true" style="width:85%;height:16px;margin-top:6px;"></ion-skeleton-text>
      </ion-card-header>
      <ion-card-content>
        <ion-skeleton-text [animated]="true" style="width:38%;height:20px;"></ion-skeleton-text>
      </ion-card-content>
    </ion-card>
  </div>

  <!-- Empty state -->
  <div *ngIf="!isLoading() && products().length === 0" class="empty-state">
    <ion-icon name="search-outline" class="empty-icon"></ion-icon>
    <h3>NENHUM PRODUTO ENCONTRADO</h3>
    <p>Tente outro termo ou remova os filtros</p>
  </div>

  <!-- Product grid -->
  <div *ngIf="!isLoading() && products().length > 0" class="product-grid">
    <app-product-card
      *ngFor="let p of products(); trackBy: trackById"
      [product]="p"
      (cardClick)="goToProduct($event)"
    ></app-product-card>
  </div>

  <!-- Infinite scroll -->
  <ion-infinite-scroll *ngIf="hasMore()" (ionInfinite)="loadMore($event)">
    <ion-infinite-scroll-content
      loadingSpinner="bubbles"
      loadingText="Carregando mais..."
    ></ion-infinite-scroll-content>
  </ion-infinite-scroll>

</ion-content>
